<!DOCTYPE html>
<html>

<head>

    <title>Boston House Price Prediction</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{

            width:700px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;

        }

        h1{

            text-align:center;

        }

        input{

            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;

        }

        button{

            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#006400;

        }

        h2{

            text-align:center;
            color:blue;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Boston Housing Price Prediction</h1>

<form action="/predict" method="POST">

<input type="number" step="any" name="CRIM" placeholder="CRIM">

<input type="number" step="any" name="ZN" placeholder="ZN">

<input type="number" step="any" name="INDUS" placeholder="INDUS">

<input type="number" step="any" name="CHAS" placeholder="CHAS">

<input type="number" step="any" name="NOX" placeholder="NOX">

<input type="number" step="any" name="RM" placeholder="RM">

<input type="number" step="any" name="AGE" placeholder="AGE">

<input type="number" step="any" name="DIS" placeholder="DIS">

<input type="number" step="any" name="RAD" placeholder="RAD">

<input type="number" step="any" name="TAX" placeholder="TAX">

<input type="number" step="any" name="PTRATIO" placeholder="PTRATIO">

<input type="number" step="any" name="B" placeholder="B">

<input type="number" step="any" name="LSTAT" placeholder="LSTAT">

<button type="submit">

Predict Price

</button>

</form>

<h2>

{{ prediction_text }}

</h2>

</div>

</body>

</html>
